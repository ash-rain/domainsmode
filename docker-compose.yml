services:
  mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: secret
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./docker/mysql/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-psecret"]
      interval: 5s
      timeout: 5s
      retries: 20

  api1:
    build:
      context: .
      dockerfile: docker/api.Dockerfile
    volumes:
      - ./api:/var/www/html
    environment:
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: network_1
      DB_USERNAME: root
      DB_PASSWORD: secret
      APP_KEY: "base64:vgocUWh73NusvbrHBvxElHEHvabwwm6MZeh/QP8I6PE="
      APP_ENV: local
      APP_DEBUG: "true"
      API_KEY: "d2ce152b85d003d6e548636f12e4a8a5c455d32101accd669cc08563d13d73a0"
      LOG_CHANNEL: stack
      LOG_STACK: stderr
    depends_on:
      mysql:
        condition: service_healthy
    logging:
      driver: loki
      options:
        loki-url: "http://localhost:3100/loki/api/v1/push"
        loki-batch-size: "400"
        labels: "service=api1"

  api2:
    build:
      context: .
      dockerfile: docker/api.Dockerfile
    volumes:
      - ./api:/var/www/html
    environment:
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: network_2
      DB_USERNAME: root
      DB_PASSWORD: secret
      APP_KEY: "base64:vgocUWh73NusvbrHBvxElHEHvabwwm6MZeh/QP8I6PE="
      APP_ENV: local
      APP_DEBUG: "true"
      API_KEY: "4c07af31de4daba9bf512b5df756eca277a7ecf9c9c980c39a4106e2b55b6558"
      LOG_CHANNEL: stack
      LOG_STACK: stderr
    depends_on:
      mysql:
        condition: service_healthy
    logging:
      driver: loki
      options:
        loki-url: "http://localhost:3100/loki/api/v1/push"
        loki-batch-size: "400"
        labels: "service=api2"

  nginx:
    build:
      context: ./docker/nginx
      dockerfile: Dockerfile
    ports:
      - "8443:8443"   # UI HTTPS
      - "8444:8444"   # API1 HTTPS
      - "8445:8445"   # API2 HTTPS
    volumes:
      - ./docker/nginx/api1.conf:/etc/nginx/conf.d/api1.conf
      - ./docker/nginx/api2.conf:/etc/nginx/conf.d/api2.conf
      - ./docker/nginx/ui.conf:/etc/nginx/conf.d/ui.conf
      - ./api:/var/www/api:ro
      - ./ui:/var/www/ui:ro
      - nginx_ssl:/etc/nginx/ssl
    depends_on:
      - api1
      - api2
      - ui
      - grafana
    logging:
      driver: loki
      options:
        loki-url: "http://localhost:3100/loki/api/v1/push"
        loki-batch-size: "400"
        labels: "service=nginx"

  ui:
    build:
      context: .
      dockerfile: docker/ui.Dockerfile
    volumes:
      - ./ui:/var/www/html
    environment:
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: domainsmode_ui
      DB_USERNAME: root
      DB_PASSWORD: secret
      APP_KEY: "base64:dcDh9B6uLr+Cpb+xYCV+/bL4R/RdUy3UmCsZO9NQA6A="
      APP_ENV: local
      APP_DEBUG: "true"
      API1_URL: https://nginx:8444
      API2_URL: https://nginx:8445
      API1_KEY: "d2ce152b85d003d6e548636f12e4a8a5c455d32101accd669cc08563d13d73a0"
      API2_KEY: "4c07af31de4daba9bf512b5df756eca277a7ecf9c9c980c39a4106e2b55b6558"
      LOG_CHANNEL: stack
      LOG_STACK: stderr
    depends_on:
      mysql:
        condition: service_healthy
    logging:
      driver: loki
      options:
        loki-url: "http://localhost:3100/loki/api/v1/push"
        loki-batch-size: "400"
        labels: "service=ui"

  loki:
    image: grafana/loki:3.5.0
    ports:
      - "3100:3100"
    volumes:
      - ./docker/loki/loki-config.yml:/etc/loki/local-config.yaml
      - loki_data:/loki
    command: -config.file=/etc/loki/local-config.yaml

  grafana:
    image: grafana/grafana:11.6.0
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Viewer
      GF_SERVER_ROOT_URL: https://localhost:8443/grafana
      GF_SERVER_SERVE_FROM_SUB_PATH: "true"
    volumes:
      - ./docker/grafana/provisioning:/etc/grafana/provisioning
      - grafana_data:/var/lib/grafana
    depends_on:
      - loki

volumes:
  mysql_data:
  nginx_ssl:       # persists the auto-generated cert across container restarts
  loki_data:
  grafana_data:
