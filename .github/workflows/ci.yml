name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test-api:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: shivammathur/setup-php@v2
        with:
          php-version: "8.4"
          extensions: pdo_sqlite

      - name: Install dependencies
        working-directory: api
        run: composer install --no-interaction --prefer-dist

      - name: Prepare environment
        working-directory: api
        run: |
          cp .env.example .env
          php artisan key:generate

      - name: Run tests
        working-directory: api
        run: php artisan test

  test-ui:
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: secret
          MYSQL_DATABASE: domainsmode_ui
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -psecret"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=20

    steps:
      - uses: actions/checkout@v4

      - uses: shivammathur/setup-php@v2
        with:
          php-version: "8.4"
          extensions: pdo_mysql

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        working-directory: ui
        run: |
          composer install --no-interaction --prefer-dist
          npm ci
          npm run build

      - name: Prepare environment
        working-directory: ui
        run: |
          cp .env.example .env
          php artisan key:generate

      - name: Run tests
        working-directory: ui
        env:
          DB_CONNECTION: mysql
          DB_HOST: 127.0.0.1
          DB_PORT: 3306
          DB_DATABASE: domainsmode_ui
          DB_USERNAME: root
          DB_PASSWORD: secret
        run: php artisan test

  deploy:
    needs: [test-api, test-ui]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd ~/domainsmode
            git pull origin main
            docker compose -f docker-compose.prod.yml up -d --build
            docker compose -f docker-compose.prod.yml exec -T api1 composer install --no-interaction --no-dev --optimize-autoloader
            docker compose -f docker-compose.prod.yml exec -T api2 composer install --no-interaction --no-dev --optimize-autoloader
            docker compose -f docker-compose.prod.yml exec -T ui composer install --no-interaction --no-dev --optimize-autoloader
            docker compose -f docker-compose.prod.yml exec -T ui npm ci
            docker compose -f docker-compose.prod.yml exec -T ui npm run build
            docker compose -f docker-compose.prod.yml exec -T ui php artisan config:cache
            docker compose -f docker-compose.prod.yml exec -T ui php artisan route:cache
            docker compose -f docker-compose.prod.yml exec -T ui php artisan view:cache
